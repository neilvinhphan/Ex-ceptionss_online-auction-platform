# Ép JUnit 5 sắp xếp thứ tự chạy các Class Test theo cấu hình @Order
junit.jupiter.testclass.order.default = org.junit.jupiter.api.ClassOrderer$OrderAnnotation

# Ép các file test phải chạy tuần tự trên duy nhất 1 luồng (Tránh chạy song song gây nghẽn/khựng mock)
junit.jupiter.execution.parallel.enabled = false